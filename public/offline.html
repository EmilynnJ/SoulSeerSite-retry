<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulSeer - You're Offline</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7f2474">
  <link rel="icon" href="/icons/icon-192x192.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background: #2c0f27;
      color: #f8f0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-image: radial-gradient(circle, #7f2474 0%, #2c0f27 70%);
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 2rem;
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 1rem;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #d4a0ff;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
      border-radius: 50%;
      border: 3px solid #d4a0ff;
      padding: 5px;
      object-fit: cover;
    }
    .cosmic-stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background-color: white;
      border-radius: 50%;
      opacity: 0.3;
      animation: twinkle 5s infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .retry-btn {
      background-color: #7f2474;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
    .retry-btn:hover {
      background-color: #9e3090;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <div class="cosmic-stars" id="stars"></div>
  
  <div class="container">
    <img src="/icons/icon-192x192.png" alt="SoulSeer Logo" class="logo">
    <h1>You're Offline</h1>
    <p>Sorry, it looks like you've lost your connection to the cosmic realm. SoulSeer requires an internet connection for psychic readings and spiritual services.</p>
    <p>Please check your connection and try again when the stars align.</p>
    <button class="retry-btn" onclick="window.location.reload()">Reconnect</button>
  </div>

  <script>
    // Create stars for background
    const starsContainer = document.getElementById('stars');
    const starsCount = 100;
    
    for (let i = 0; i < starsCount; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      
      // Random size between 1-4px
      const size = Math.random() * 3 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      
      // Random position
      star.style.left = `${Math.random() * 100}vw`;
      star.style.top = `${Math.random() * 100}vh`;
      
      // Random animation delay
      star.style.animationDelay = `${Math.random() * 5}s`;
      
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
